<!DOCTYPE html>
<html>

<title>MenuAi App</title>

<style>

body{

    font-family:Arial,sans-serif;

    cursor:pointer;

    opacity:.9;

    text-align:center;
    margin:15px 0;

}

.language-bar button{

    width:60px;
    display:inline-block;
    margin:5px;

}

/* More Info */

.dish-info{

    margin-top:20px;
    padding:20px;
    background:#f0f0f0;
    border-radius:12px;
    white-space:pre-line;
    line-height:1.7;
    display:none;
    font-size:18px;

}

/* MOBILE */

body{

    padding:10px;

.container{

    padding:15px;

}

p{

}

input{

    font-size:17px;
    padding:16px;

}

button{

    padding:16px;

}

.category h2{

    font-size:28px;

}

.item h3{

    font-size:24px;

}

.item p{

    font-size:17px;

}

.price{

    font-size:20px;

}

.dish-info{

    font-size:17px;
    line-height:1.8;

}

.language-bar button{

    width:55px;

  <body>

<div class="container">

    <h1>MenuAi App</h1>

    <div class="language-bar">

        <button onclick="changeLanguage('es')">
            🇪🇸
        </button>

        <button onclick="changeLanguage('en')">
            🇬🇧
        </button>

        <button onclick="changeLanguage('fr')">
            🇫🇷
        </button>

        <button onclick="changeLanguage('it')">
            🇮🇹
        </button>

    </div>

    <p>
        Digitaliza cartas y menús de restaurantes al instante con IA
    </p>

    <input
        type="text"
        id="url"
        placeholder="Pegar URL carta digital o Web"
    />

    <input
        type="file"
        id="imageFile"
        accept="image/*"
        capture="environment"
    />

    <button onclick="extractMenu()">
        📸 Digitaliza ahora
    </button>

    <hr>

    <button onclick="exportCSV()">
        Exportar CS   
    </button>

    <div id="result"></div>

</div>

    <script>

//==================================================
// BLOQUE 01 - VARIABLES GLOBALES
//==================================================

let currentMenu = [];

let currentLanguage = "es";

//==================================================
// BLOQUE 02 - EXTRAER MENU
//==================================================

async function extractMenu() {

  document.getElementById("result").innerHTML =
    "🤖 Digitalizando menú tardara un momento, paciencia por favor :-) ...";

  const url =
    document.getElementById("url").value;

  const formData =
    new FormData();

  formData.append("url", url);

  const imageFile =
    document.getElementById("imageFile").files[0];

  if (imageFile) {

    formData.append(
      "imageFile",
      imageFile
    );

  }

  try {

    const response =
      await fetch("/process", {

        method: "POST",

        body: formData

      });

    const data =
      await response.json();

    console.log(data);

    if (!data.success) {

      document.getElementById("result").innerHTML =
        "❌ " + data.error;

      return;

    }

    const menu =
      JSON.parse(data.parsedMenu);

    currentMenu =
      menu.items;

    renderMenu(currentMenu);

  }

  catch(error){

    console.error(error);

    document.getElementById("result").innerHTML =
      "❌ Error de conexión con el servidor.";

  }

}
