<!DOCTYPE html>
<html>

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MenuAi App</title>

  <style>

    body {

      font-family: Arial;
      background: #f2f2f2;
      padding: 15px;
      margin: 0;

    }

    .container {

      max-width: 1000px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 20px;

    }

    h1 {

      font-size: 52px;
      margin-bottom: 10px;

    }

    p {

      font-size: 20px;
      color: #555;

    }

    input {

      width: 100%;
      padding: 18px;
      font-size: 18px;
      margin-bottom: 20px;
      box-sizing: border-box;
      border-radius: 12px;
      border: 1px solid #ccc;

    }

    button {

      width: 100%;
      padding: 18px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 10px;
      border-radius: 12px;
      border: none;
      background: black;
      color: white;

    }

    button:hover {

      opacity: 0.9;

    }

    .category {

      margin-top: 40px;

    }

    .category h2 {

      font-size: 34px;
      border-bottom: 2px solid #eee;
      padding-bottom: 10px;

    }

    .item {

      background: #f7f7f7;
      padding: 20px;
      border-radius: 16px;
      margin-top: 15px;

    }

    .item h3 {

      font-size: 28px;
      margin-bottom: 10px;

    }

    .item p {

      font-size: 18px;
      line-height: 1.5;

    }

    .price {

      font-weight: bold;
      margin-top: 10px;
      font-size: 22px;

    }

    .dish-info {

      margin-top: 20px;
      padding: 20px;
      background: #f0f0f0;
      border-radius: 12px;
      white-space: pre-line;
      line-height: 1.7;
      display: none;
      font-size: 18px;

    }

    /* MOBILE */

    @media (max-width: 768px) {

      body {

        padding: 10px;

      }

      .container {

        padding: 15px;
        border-radius: 14px;

      }

      h1 {

        font-size: 42px;

      }

      p {

        font-size: 17px;

      }

      input {

        font-size: 17px;
        padding: 16px;

      }

      button {

        font-size: 17px;
        padding: 16px;

      }

      .category h2 {

        font-size: 28px;

      }

      .item h3 {

        font-size: 24px;

      }

      .item p {

        font-size: 17px;

      }

      .price {

        font-size: 20px;

      }

      .dish-info {

        font-size: 17px;
        line-height: 1.8;

      }

    }

  </style>

</head>

<body>

<div class="container">

 <h1>MenuAi App</h1>

<div style="text-align:center; margin:15px 0;">

  <button onclick="changeLanguage('es')" style="width:60px;">
    🇪🇸
  </button>

  <button onclick="changeLanguage('en')" style="width:60px;">
    🇬🇧
  </button>

  <button onclick="changeLanguage('fr')" style="width:60px;">
    🇫🇷
  </button>

  <button onclick="changeLanguage('it')" style="width:60px;">
    🇮🇹
  </button>

</div>

<p>
  Digitaliza cartas y menús de restaurantes al Instante con IA
</p>

  <input
    type="text"
    id="url"
    placeholder="Pegar URL carta digital o Web"
  />

  <input
    type="file"
    id="imageFile"
    accept="image/*"
    capture="environment"
  />

  <button onclick="extractMenu()">
    📸 Digitaliza ahora
  </button>

  <hr>


  <button onclick="exportCSV()">
    Exportar CSV
  </button>

  <div id="result"></div>

</div>

<script>

let currentMenu = [];

let currentLanguage = "es";

async function extractMenu() {

  document.getElementById("result").innerHTML =
    "🤖 Loading menu...";

  const url =
    document.getElementById("url").value;

  const formData =
    new FormData();

  formData.append("url", url);

  const imageFile =
    document.getElementById("imageFile").files[0];

  if (imageFile) {

    formData.append(
      "imageFile",
      imageFile
    );

  }

  const response =
    await fetch("/process", {

      method: "POST",

      body: formData

    });

  const data =
    await response.json();

  console.log(data);

  if (!data.success) {

    document.getElementById("result").innerHTML =
      "Error: " + data.error;

    return;

  }

  const menu =
    JSON.parse(data.parsedMenu);

  const items =
    menu.items;

  currentMenu = items;

  let html = "";

  let currentCategory = "";

  items.forEach(item => {

    if (item.category !== currentCategory) {

      currentCategory =
        item.category;

      html += `
        <div class="category">
          <h2>${currentCategory}</h2>
        </div>
      `;

    }

    html += `
      <div class="item">

        <h3>${item.name}</h3>

        <p>${item.description}</p>

        <div class="price">
          ${item.price}
        </div>

        <button
         onclick="getDishInfo(
  '${item.name}',
  '${item.category}',
  this
)"
        >

          ✨ More Info

        </button>

        <div class="dish-info"></div>

      </div>
    `;

  });

  document.getElementById("result").innerHTML =
    html;

}


async function getDishInfo(
  dishName,
  category,
  button
)
{

  const infoBox =
    button.parentElement.querySelector(".dish-info");

  infoBox.style.display =
    "block";

  infoBox.innerHTML =
    "🤖 Pensando...";

  try {

    const response =
      await fetch("/dish-info", {

        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({

          dishName: dishName,
          category: category,

          restaurant: "Restaurant"

        })

      });

    const data =
      await response.json();

    if (!data.success) {

      infoBox.innerHTML =
        data.error;

      return;

    }

    infoBox.innerHTML =
      data.info;

  } catch (error) {

    infoBox.innerHTML =
      error.message;

  }

}


function exportCSV() {

  if (currentMenu.length === 0) {

    alert("No menu loaded");

    return;

  }

  let csv =
  "Categoria,Plato,Descripcion,Precio\n";

  currentMenu.forEach(item => {

  csv += `"${item.category || ""}","${item.name || ""}","${item.description || ""}","${item.price || ""}"\n`;

});


  const blob =
    new Blob([csv], {

      type: "text/csv"

    });

  const url =
    window.URL.createObjectURL(blob);

  const a =
    document.createElement("a");

  a.href = url;

  a.download = "menu.csv";

  a.click();

}

  async function changeLanguage(language) {

  currentLanguage = language;

  console.log(
    "Idioma seleccionado:",
    language
  );

  if (currentMenu.length === 0) {

    alert(
      "Primero digitaliza una carta."
    );

    return;

  }

  try {

    const response =
      await fetch("/translate", {

        method: "POST",

        headers: {

          "Content-Type":
            "application/json"

        },

        body: JSON.stringify({

          language: language,

          menu: currentMenu

        })

      });

    const data =
      await response.json();

    console.log(data);

    alert(
      "Servidor conectado correctamente."
    );

  } catch (error) {

    alert(error.message);

  }

}

</script>

</body>
</html>
