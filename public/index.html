<!DOCTYPE html>
<html>

<head>

  <title>MenuAi App</title>

  <style>

    body {

      font-family: Arial;
      background: #f2f2f2;
      padding: 40px;

    }

    .container {

      max-width: 1000px;
      margin: auto;
      background: white;
      padding: 40px;
      border-radius: 20px;

    }

    input {

      width: 100%;
      padding: 15px;
      font-size: 18px;
      margin-bottom: 20px;

    }

    button {

      width: 100%;
      padding: 15px;
      font-size: 18px;
      cursor: pointer;

    }

    .category {

      margin-top: 40px;

    }

    .item {

      background: #f7f7f7;
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;

    }

    .price {

      font-weight: bold;
      margin-top: 10px;

    }

  </style>

</head>

<body>

<div class="container">

  <h1>MenuAi App</h1>

  <p>
    Extract restaurant menus using AI
  </p>

  <input
    type="text"
    id="url"
    placeholder="Paste restaurant URL"
  />

  <button onclick="extractMenu()">
    Extract Menu
  </button>

  <div id="result"></div>

</div>

<script>

async function extractMenu() {

  document.getElementById("result").innerHTML =
    "Loading menu...";

  const url =
    document.getElementById("url").value;

  const formData =
    new FormData();

  formData.append("url", url);

  const response =
    await fetch("/process", {

      method: "POST",

      body: formData

    });

  const data =
    await response.json();

  console.log(data);

  if (!data.success) {

    document.getElementById("result").innerHTML =
      "Error: " + data.error;

    return;

  }

  const menu =
    JSON.parse(data.parsedMenu);

  const items =
    menu.items;

  let html = "";

  let currentCategory = "";

  items.forEach(item => {

    if (item.category !== currentCategory) {

      currentCategory =
        item.category;

      html += `
        <div class="category">
          <h2>${currentCategory}</h2>
        </div>
      `;

    }

    html += `
      <div class="item">

        <h3>${item.name}</h3>

        <p>${item.description}</p>

        <div class="price">
          ${item.price}
        </div>

      </div>
    `;

  });

  document.getElementById("result").innerHTML =
    html;

}

</script>

</body>
</html>
