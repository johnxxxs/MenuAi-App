<!DOCTYPE html>
<html>

<head>

  <title>MenuAi App</title>

  <style>

    body {

      font-family: Arial;
      background: #f2f2f2;
      padding: 40px;

    }

    .container {

      max-width: 1000px;
      margin: auto;
      background: white;
      padding: 40px;
      border-radius: 20px;

    }

    input {

      width: 100%;
      padding: 15px;
      font-size: 18px;
      margin-bottom: 20px;

    }

    button {

      width: 100%;
      padding: 15px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 10px;

    }

    .category {

      margin-top: 40px;

    }

    .item {

      background: #f7f7f7;
      padding: 20px;
      border-radius: 10px;
      margin-top: 15px;

    }

    .price {

      font-weight: bold;
      margin-top: 10px;

    }

    .dish-info {

      margin-top: 20px;

      padding: 20px;

      background: #f0f0f0;

      border-radius: 10px;

      white-space: pre-line;

      line-height: 1.6;

      display: none;

    }

  </style>

</head>

<body>

<div class="container">

  <h1>MenuAi App</h1>

  <p>
    Extract restaurant menus using AI
  </p>

  <input
    type="text"
    id="url"
    placeholder="Paste restaurant URL"

    <input
  type="file"
  id="imageFile"
  accept="image/*"
/>
  />

  <button onclick="extractMenu()">
    Extract Menu
  </button>

  <div id="result"></div>
  <button onclick="exportCSV()">

  Export CSV WooCommerce

</button>

</div>

<script>

  let currentMenu = [];

  
async function extractMenu() {

  document.getElementById("result").innerHTML =
    "Loading menu...";

  const url =
    document.getElementById("url").value;

  const formData =
    new FormData();

  formData.append("url", url);

  const imageFile =
  document.getElementById("imageFile").files[0];

if (imageFile) {

  formData.append(
    "imageFile",
    imageFile
  );

}

  const response =
    await fetch("/process", {

      method: "POST",

      body: formData

    });

  const data =
    await response.json();

  console.log(data);

  if (!data.success) {

    document.getElementById("result").innerHTML =
      "Error: " + data.error;

    return;

  }

  const menu =
    JSON.parse(data.parsedMenu);

  const items =
    menu.items;

  currentMenu = items;

  let html = "";

  let currentCategory = "";

  items.forEach(item => {

    if (item.category !== currentCategory) {

      currentCategory =
        item.category;

      html += `
        <div class="category">
          <h2>${currentCategory}</h2>
        </div>
      `;

    }

    html += `
      <div class="item">

        <h3>${item.name}</h3>

        <p>${item.description}</p>

        <div class="price">
          ${item.price}
        </div>

        <button
          onclick="getDishInfo('${item.name}', this)"
        >

          ✨ More Info

        </button>

        <div class="dish-info"></div>

      </div>
    `;

  });

  document.getElementById("result").innerHTML =
    html;

}


async function getDishInfo(dishName, button) {

  const infoBox =
    button.parentElement.querySelector(".dish-info");

  infoBox.style.display =
    "block";

  infoBox.innerHTML =
    "🤖 Pensando...";

  try {

    const response =
      await fetch("/dish-info", {

        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({

          dishName: dishName,

          restaurant: "Restaurant"

        })

      });

    const data =
      await response.json();

    if (!data.success) {

      infoBox.innerHTML =
        data.error;

      return;

    }

    infoBox.innerHTML =
      data.info;

  } catch (error) {

    infoBox.innerHTML =
      error.message;

  }

}

function exportCSV() {

  if (currentMenu.length === 0) {

    alert("No menu loaded");

    return;

  }

  let csv =
    "Name,Description,Price,Category\n";

  currentMenu.forEach(item => {

    csv += `"${item.name}","${item.description}","${item.price}","${item.category}"\n`;

  });

  const blob =
    new Blob([csv], {

      type: "text/csv"

    });

  const url =
    window.URL.createObjectURL(blob);

  const a =
    document.createElement("a");

  a.href = url;

  a.download = "menu.csv";

  a.click();

}


</script>

</body>
</html>
