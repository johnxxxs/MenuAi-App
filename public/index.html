<!DOCTYPE html>
<html>

<head>

  <title>MenuAi App</title>

<style>

body {

  font-family: Arial;
  background: #f2f2f2;
  padding: 15px;
  margin: 0;

}

.container {

  max-width: 1000px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 20px;

}

h1 {

  font-size: 52px;
  margin-bottom: 10px;

}

p {

  font-size: 20px;
  color: #555;

}

input {
</style>

</head>

<body>

<div class="container">

  <h1>MenuAi App</h1>

  <p>
    Extract restaurant menus using AI
  </p>

  <input
    type="text"
    id="url"
    placeholder="Paste restaurant URL"
  />

  <input
    type="file"
    id="imageFile"
    accept="image/*"
    capture="environment"
  />

  <button onclick="extractMenu()">
    Extract Menu
  </button>

  <button onclick="exportCSV()">

    Export CSV WooCommerce

  </button>

  <div id="result"></div>

</div>

<script>

let currentMenu = [];

async function extractMenu() {

  document.getElementById("result").innerHTML =
    "Loading menu...";

  const url =
    document.getElementById("url").value;

  const formData =
    new FormData();

  formData.append("url", url);

  const imageFile =
    document.getElementById("imageFile").files[0];

  if (imageFile) {

    formData.append(
      "imageFile",
      imageFile
    );

  }

  const response =
    await fetch("/process", {

      method: "POST",

      body: formData

    });

  const data =
    await response.json();

  console.log(data);

  if (!data.success) {

    document.getElementById("result").innerHTML =
      "Error: " + data.error;

    return;

  }

  const menu =
    JSON.parse(data.parsedMenu);

  const items =
    menu.items;

  currentMenu = items;

  let html = "";

  let currentCategory = "";

  items.forEach(item => {

    if (item.category !== currentCategory) {

      currentCategory =
        item.category;

      html += `
        <div class="category">
          <h2>${currentCategory}</h2>
        </div>
      `;

    }

    html += `
      <div class="item">

        <h3>${item.name}</h3>

        <p>${item.description}</p>

        <div class="price">
          ${item.price}
        </div>

        <button
          onclick="getDishInfo('${item.name}', this)"
        >

          ✨ More Info

        </button>

        <div class="dish-info"></div>

      </div>
    `;

  });

  document.getElementById("result").innerHTML =
    html;

}


async function getDishInfo(dishName, button) {

  const infoBox =
    button.parentElement.querySelector(".dish-info");

  infoBox.style.display =
    "block";

  infoBox.innerHTML =
    "🤖 Pensando...";

  try {

    const response =
      await fetch("/dish-info", {

        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({

          dishName: dishName,

          restaurant: "Restaurant"

        })

      });

    const data =
      await response.json();

    if (!data.success) {

      infoBox.innerHTML =
        data.error;

      return;

    }

    infoBox.innerHTML =
      data.info;

  } catch (error) {

    infoBox.innerHTML =
      error.message;

  }

}


function exportCSV() {

  if (currentMenu.length === 0) {

    alert("No menu loaded");

    return;

  }

  let csv =
    "Name,Description,Price,Category\n";

  currentMenu.forEach(item => {

    csv += `"${item.name}","${item.description}","${item.price}","${item.category}"\n`;

  });

  const blob =
    new Blob([csv], {

      type: "text/csv"

    });

  const url =
    window.URL.createObjectURL(blob);

  const a =
    document.createElement("a");

  a.href = url;

  a.download = "menu.csv";

  a.click();

}

</script>

</body>
</html>
