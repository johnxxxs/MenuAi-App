<!DOCTYPE html>
<html> 

<head>

<meta charset="UTF-8">

<meta 
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>MenuAi App</title>

<style>

body{

    font-family:Arial,sans-serif;
    background:#f2f2f2;
    padding:15px;
    margin:0;

}

.container{

    max-width:1000px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:20px;

}

h1{

    font-size:52px;
    margin-bottom:10px;
    text-align:center;

}

p{

    font-size:20px;
    color:#555;
    text-align:center;

}

input{

    width:100%;
    padding:18px;
    font-size:18px;
    margin-bottom:20px;
    box-sizing:border-box;
    border-radius:12px;
    border:1px solid #ccc;

}

button{

    width:100%;
    padding:18px;
    font-size:18px;
    cursor:pointer;
    margin-top:10px;
    border-radius:12px;
    border:none;
    background:black;
    color:white;

}

button:hover{

    opacity:.9;

}

.category{

    margin-top:40px;

}

.category h2{

    font-size:34px;
    border-bottom:2px solid #eee;
    padding-bottom:10px;

}

.item{

    background:#f7f7f7;
    padding:20px;
    border-radius:16px;
    margin-top:15px;

}

.item h3{

    font-size:28px;
    margin-bottom:10px;

}

.item p{

    font-size:18px;
    line-height:1.5;
    text-align:left;

}

.price{

    font-weight:bold;
    margin-top:10px;
    font-size:22px;

}

/* Banderas */

.language-bar{

    text-align:center;
    margin:15px 0;

}

.language-bar button{

    width:60px;
    display:inline-block;
    margin:5px;

}

/* More Info */

.dish-info{

    margin-top:20px;
    padding:20px;
    background:#f0f0f0;
    border-radius:12px;
    white-space:pre-line;
    line-height:1.7;
    display:none;
    font-size:18px;

}

/* MOBILE */

@media(max-width:768px){

body{

    padding:10px;

}

.container{

    padding:15px;
    border-radius:14px;

}

h1{

    font-size:42px;

}

p{

    font-size:17px;

}

input{

    font-size:17px;
    padding:16px;

}

button{

    font-size:17px;
    padding:16px;

}

.category h2{

    font-size:28px;

}

.item h3{

    font-size:24px;

}

.item p{

    font-size:17px;

}

.price{

    font-size:20px;

}

.dish-info{

    font-size:17px;
    line-height:1.8;

}

.language-bar button{

    width:55px;

}

}

</style>

</head>



  <body>

<div class="container">

    <h1>MenuAi App</h1>

    <div class="language-bar">

        <button onclick="changeLanguage('es')">
            🇪🇸
        </button>

        <button onclick="changeLanguage('en')">
            🇬🇧
        </button>

        <button onclick="changeLanguage('fr')">
            🇫🇷
        </button>

        <button onclick="changeLanguage('it')">
            🇮🇹
        </button>

    </div>

    <p>
        Digitaliza cartas y menús de restaurantes al instante con IA
    </p>

    <input
        type="text"
        id="url"
        placeholder="Pegar URL carta digital o Web"
    />

    <input
        type="file"
        id="imageFile"
        accept="image/*"
        capture="environment"
    />

    <button onclick="extractMenu()">
        📸 Digitaliza ahora
    </button>

    <hr>

    <button onclick="exportCSV()">
        Exportar CS   
    </button>

    <div id="result"></div>

</div>

    <script>

//==================================================
// BLOQUE 01 - VARIABLES GLOBALES
//==================================================

let currentMenu = [];

let currentLanguage = "es";

//==================================================
// BLOQUE 02 - EXTRAER MENU
//==================================================

async function extractMenu() {

  document.getElementById("result").innerHTML =
    "🤖 Digitalizando menú tardara un momento, paciencia por favor :-) ...";

  const url =
    document.getElementById("url").value;

  const formData =
    new FormData();

  formData.append("url", url);

  const imageFile =
    document.getElementById("imageFile").files[0];

  if (imageFile) {

    formData.append(
      "imageFile",
      imageFile
    );

  }

  try {

    const response =
      await fetch("/process", {

        method: "POST",

        body: formData

      });

    const data =
      await response.json();

    console.log(data);
    
    if (!data.success) {

      document.getElementById("result").innerHTML =
        "❌ " + data.error;

      return;

    }

    const cleanJson =
  data.parsedMenu
    .replace(/```json/g, "")
    .replace(/```/g, "")
    .trim();

const menu =
  JSON.parse(cleanJson);

    currentMenu =
      menu.items;

    renderMenu(currentMenu);

  }

  catch(error){

    console.error(error);

    document.getElementById("result").innerHTML =
      "❌ Error de conexión con el servidor.";

  }

}

//==================================================
// BLOQUE 03 - RENDER MENU
//==================================================

function renderMenu(items) {

  let html = "";

  let currentCategory = "";

  items.forEach(item => {

    if (item.category !== currentCategory) {

      currentCategory = item.category;

      html += `
        <div class="category">
          <h2>${currentCategory}</h2>
        </div>
      `;

    }

    html += `
      <div class="item">

        <h3>${item.name || ""}</h3>

        <p>${item.description || ""}</p>

        <div class="price">
          ${item.price || ""}
        </div>

        <button
          onclick="getDishInfo(
            '${item.name}',
            '${item.category}',
            this
          )">

          ✨ More Info

        </button>

        <div class="dish-info"></div>

      </div>
    `;

  });

  document.getElementById("result").innerHTML =
    html; 

}

      //==================================================
// BLOQUE 04 - MORE INFO
//==================================================

async function getDishInfo(
  dishName,
  category,
  button
) {

  const infoBox =
    button.parentElement.querySelector(".dish-info");

  infoBox.style.display =
    "block";

  infoBox.innerHTML =
    "🤖 Pensando...";

  try {

    const response =
      await fetch("/dish-info", {

        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({

          dishName: dishName,

          category: category,

          restaurant: "Restaurant"

        })

      });

    const data =
      await response.json();

    if (!data.success) {

      infoBox.innerHTML =
        data.error;

      return;

    }

    infoBox.innerHTML =
      data.info;

  }

  catch(error){

    console.error(error);

    infoBox.innerHTML =
      "❌ Error obteniendo información.";

  }

}

//==================================================
// FIN BLOQUE 04
//==================================================


      //==================================================
// BLOQUE 05 - EXPORTAR CSV
//==================================================

function exportCSV() {

  if (currentMenu.length === 0) {

    alert("Digitaliza una carta o menú primero");

    return;

  }

  let csv =
    "Categoria,Plato,Descripcion,Precio\n";

  currentMenu.forEach(item => {

    csv +=
      `"${item.category || ""}",` +
      `"${item.name || ""}",` +
      `"${item.description || ""}",` +
      `"${item.price || ""}"\n`;

  });

  const blob =
    new Blob([csv], {

      type: "text/csv;charset=utf-8;"

    });

  const url =
    window.URL.createObjectURL(blob);

  const a =
    document.createElement("a");

  a.href = url;

  a.download = "menu.csv";

  document.body.appendChild(a);

  a.click();

  document.body.removeChild(a);

  window.URL.revokeObjectURL(url);

}

//==================================================
// FIN BLOQUE 05
//==================================================

//==================================================
// BLOQUE 06 - CAMBIAR IDIOMA
//==================================================

async function changeLanguage(language) {

  currentLanguage = language;

  // Cambia inmediatamente toda la interfaz
  translateInterface(language);

  console.log(
    "Idioma seleccionado:",
    language
  );

  // Si todavía no existe un menú,
  // simplemente terminamos aquí.

  if (currentMenu.length === 0) {

    return;

  }

  // Si existe un menú,
  // pedimos su traducción al servidor.

  try {

    const response =
      await fetch("/translate", {

        method: "POST",

        headers: {

          "Content-Type":
            "application/json"

        },

        body: JSON.stringify({

          language: language,

          menu: currentMenu

        })

      });

    const data =
      await response.json();

    if (!data.success) {

      alert(data.error);

      return;

    }

    // De momento solo comprobamos que responde.
    // En el siguiente bloque aquí llegará
    // el menú traducido.

    currentMenu = data.menu;

    renderMenu(currentMenu);

  }

  catch(error){

    console.error(error);

    alert(
      "❌ Error de comunicación con el servidor."
    );

  }

}

//==================================================
// FIN BLOQUE 06
//==================================================


//==================================================
// BLOQUE 07 - TRADUCIR INTERFAZ
//==================================================

const interfaceTexts = {

  es: {

    title: "MenuAi App",

    subtitle:
      "Digitaliza cartas y menús de restaurantes al instante con IA",

    placeholder:
      "Pegar URL carta digital o Web",

    scan:
      "📸 Escanear Menú",

    csv:
      "Exportar CSV",

    more:
      "✨ More Info"

  },

  en: {

    title: "MenuAi App",

    subtitle:
      "Digitize restaurant menus instantly with AI",

    placeholder:
      "Paste menu or website URL",

    scan:
      "📸 Scan Now",

    csv:
      "Export CSV",

    more:
      "✨ More Info"

  },

  fr: {

    title: "MenuAi App",

    subtitle:
      "Numérisez instantanément les menus de restaurant avec l'IA",

    placeholder:
      "Coller l'URL du menu ou du site Web",

    scan:
      "📸 Scanner le menu",

    csv:
      "Exporter CSV",

    more:
      "✨ Plus d'informations"

  },

  it: {

    title: "MenuAi App",

    subtitle:
      "Digitalizza istantaneamente i menu dei ristoranti con l'IA",

    placeholder:
      "Incolla l'URL del menu o del sito",

    scan:
      "📸 Scansiona menu",

    csv:
      "Esporta CSV",

    more:
      "✨ Maggiori informazioni"

  }

};

function translateInterface(language){

  const t = interfaceTexts[language];

  document.querySelector("h1").innerText =
    t.title;

  document.querySelector("p").innerText =
    t.subtitle;

  document.getElementById("url").placeholder =
    t.placeholder;

  document.querySelector(
    "button[onclick='extractMenu()']"
  ).innerText =
    t.scan;

  document.querySelector(
    "button[onclick='exportCSV()']"
  ).innerText =
    t.csv;

}

//==================================================
// FIN BLOQUE 07
//==================================================

      


  

  </script>
